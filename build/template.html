<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- __BRAND_TITLE__ / __META_DESCRIPTION__ are substituted from meta.brand.title and
     meta.description_meta by build_html.py, so crawlers see them without running the script.
     og:image is deliberately omitted: it would require an absolute hosted URL and break the
     zero-external-asset property that makes the file:// copy fully self-contained. -->
<title>__BRAND_TITLE__</title>
<meta name="description" content="__META_DESCRIPTION__">
<meta property="og:type" content="website">
<meta property="og:title" content="__BRAND_TITLE__">
<meta property="og:description" content="__META_DESCRIPTION__">
<!-- Favicon: the ¶ brand glyph (%C2%B6) in the accent ink on paper, inline so nothing is fetched. -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='13' fill='%23faf7f0'/%3E%3Ctext x='32' y='48' text-anchor='middle' font-family='Georgia,serif' font-size='46' font-weight='600' fill='%237c2d12'%3E%C2%B6%3C/text%3E%3C/svg%3E">
<style>
/* ============ Compliance Atlas — folio styling, zero external deps ============ */
:root{
  color-scheme: light;   /* native chrome (scrollbars, search-field clear button) follows the theme */
  /* Muted and status inks are set to clear 4.5:1 against every surface they are used on
     (card, paper, paper-2, heat-0) in this theme. See the PR-056 note in AUDIT-FINDINGS 21. */
  --paper:#faf7f0; --paper-2:#f2ede1; --card:#fffdf8; --ink:#20242c; --ink-2:#565b66; --ink-3:#656870;
  --rule:#d9d2c2; --rule-2:#c5bda9; --accent:#7c2d12; --accent-ink:#7c2d12; --link:#1e5fae;
  --direct:#177245; --partial:#1e5fae; --evidence:#8d630e; --nocover:#6d6962;
  --direct-bg:#e3f0e8; --partial-bg:#e5edf8; --evidence-bg:#f5ecd9; --nocover-bg:#edeae3;
  --warn-bg:#f7ead2; --warn-ink:#7a5410; --warn-rule:#d9b56a;
  --danger:#a03123; --danger-bg:#f7e2de;
  --heat-0:#efe9dc;
  --shadow:0 1px 2px rgba(60,50,30,.08), 0 4px 14px rgba(60,50,30,.07);
  --font-display:Cambria,"Palatino Linotype",Georgia,"Times New Roman",serif;
  --font-body:"Segoe UI Variable Text","Segoe UI",-apple-system,"Helvetica Neue",sans-serif;
  --font-mono:"Cascadia Code",Consolas,"SF Mono",Menlo,monospace;
}
[data-theme="dark"]{
  color-scheme: dark;
  --paper:#181b22; --paper-2:#131519; --card:#20242d; --ink:#e6e2d8; --ink-2:#a9adb6; --ink-3:#8a8f99;
  --rule:#343a46; --rule-2:#434a58; --accent:#d08770; --accent-ink:#d08770; --link:#5b96d6;
  --direct:#3da776; --partial:#5b96d6; --evidence:#b68b28; --nocover:#9a958c;
  --direct-bg:#1d3229; --partial-bg:#1e2c3f; --evidence-bg:#332a17; --nocover-bg:#2a2c2e;
  --warn-bg:#332a17; --warn-ink:#d9b56a; --warn-rule:#8a6d2e;
  --danger:#e08577; --danger-bg:#3a221f;
  --heat-0:#232833;
  --shadow:0 1px 2px rgba(0,0,0,.4), 0 4px 14px rgba(0,0,0,.35);
}
*{box-sizing:border-box}
/* scroll-padding keeps a focused element clear of the sticky header when the browser
   scrolls it into view (Tab traversal, skip link, per-route focus move). */
html{scroll-behavior:smooth; scroll-padding-top:76px}
body{
  margin:0; background:var(--paper); color:var(--ink);
  font:15px/1.55 var(--font-body);
  background-image:repeating-linear-gradient(0deg, transparent 0 2px, rgba(120,100,60,.016) 2px 4px);
}
[data-theme="dark"] body{background-image:repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,.012) 2px 4px)}
a{color:var(--link); text-decoration:none} a:hover{text-decoration:underline}

/* ---------- accessibility utilities ---------- */
.sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden;
  clip:rect(0 0 0 0); clip-path:inset(50%); white-space:nowrap; border:0}
/* Skip link: position:fixed so revealing it cannot shift the layout. */
.skip{position:fixed; left:10px; top:-64px; z-index:100; padding:10px 16px; border-radius:8px;
  background:var(--card); color:var(--link); border:1px solid var(--rule-2); box-shadow:var(--shadow);
  font:600 13.5px var(--font-body); text-decoration:none; transition:top .12s ease}
.skip:focus{top:10px}
/* Focus visibility: the search field's focus ink applied to every interactive element.
   --link clears 4.5:1 against paper in both themes, so the ring is visible in each. */
a:focus-visible, button:focus-visible, summary:focus-visible, [tabindex]:focus-visible{
  outline:2px solid var(--link); outline-offset:2px;
  box-shadow:0 0 0 4px color-mix(in srgb, var(--link) 18%, transparent)}
/* details.row sets overflow:hidden, which would clip an outset ring on its summary. */
details.row>summary:focus-visible, details.disclose>summary:focus-visible{
  outline-offset:-3px; box-shadow:none}
/* Programmatic focus targets (skip-link landing, per-route heading) take no visible ring:
   they are containers the user was moved to, not controls they navigated onto. */
main#app:focus, main#app:focus-visible,
h1[tabindex="-1"]:focus, h1[tabindex="-1"]:focus-visible{outline:none; box-shadow:none}
h1,h2,h3,.serif{font-family:var(--font-display); font-weight:600; letter-spacing:.01em}
mark{background:var(--warn-bg); color:inherit; padding:0 2px; border-radius:2px}
.mono{font-family:var(--font-mono)}
.wrap{max-width:1180px; margin:0 auto; padding:0 28px}
.overline{font:600 11px/1 var(--font-body); letter-spacing:.18em; text-transform:uppercase; color:var(--accent-ink)}
.muted{color:var(--ink-2)} .small{font-size:12.5px} .tiny{font-size:11.5px}

/* ---------- header ---------- */
header.site{position:sticky; top:0; z-index:50; background:var(--paper); border-bottom:1px solid var(--rule-2)}
header.site .bar{display:flex; align-items:center; gap:18px; padding:12px 0}
.brand{display:flex; align-items:baseline; gap:10px; white-space:nowrap; cursor:pointer;
  color:inherit; text-decoration:none}
a.brand:hover{text-decoration:none}
.brand .glyph{font-family:var(--font-display); font-size:22px; color:var(--accent-ink)}
.brand b{font-family:var(--font-display); font-size:18px; font-weight:600}
.brand span{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3)}
nav.tabs{display:flex; gap:2px; margin-left:6px}
nav.tabs a{padding:7px 12px; border-radius:6px; color:var(--ink-2); font-size:13.5px; font-weight:600; white-space:nowrap}
nav.tabs a.on{background:var(--paper-2); color:var(--ink); box-shadow:inset 0 0 0 1px var(--rule)}
.spacer{flex:1}
.searchbox{position:relative}
.searchbox input{
  width:290px; max-width:34vw; padding:8px 12px 8px 32px; border:1px solid var(--rule-2); border-radius:8px;
  background:var(--card); color:var(--ink); font:13.5px var(--font-body); outline:none;
}
.searchbox input:focus{border-color:var(--link); box-shadow:0 0 0 3px color-mix(in srgb, var(--link) 18%, transparent)}
.searchbox .icon{position:absolute; left:10px; top:8px; color:var(--ink-3); pointer-events:none}
.iconbtn{border:1px solid var(--rule-2); background:var(--card); color:var(--ink-2); border-radius:8px; padding:7px 10px; cursor:pointer; font-size:13px}
.iconbtn:hover{color:var(--ink)}

/* ---------- badges & chips ---------- */
.badge{display:inline-flex; align-items:center; gap:6px; font:600 11.5px/1 var(--font-body); letter-spacing:.02em;
  padding:4px 9px; border-radius:999px; white-space:nowrap}
.badge::before{content:""; width:7px; height:7px; border-radius:2px; background:currentColor}
.b-direct{color:var(--direct); background:var(--direct-bg); box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--direct) 35%, transparent)}
.b-partial{color:var(--partial); background:var(--partial-bg); box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--partial) 35%, transparent)}
.b-evidence{color:var(--evidence); background:var(--evidence-bg); box-shadow:inset 0 0 0 1px color-mix(in srgb, var(--evidence) 40%, transparent)}
.b-evidence::before{border-radius:50%}
.b-nocover{color:var(--nocover); background:var(--nocover-bg); box-shadow:inset 0 0 0 1px var(--rule-2)}
.b-nocover::before{background:transparent; border:1.5px dashed currentColor; width:6px; height:6px}
.conf{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; color:var(--ink-2); white-space:nowrap}
.conf .dots{letter-spacing:2px; font-size:10px}
.chip{display:inline-block; font:600 11px/1 var(--font-mono); padding:4px 8px; border-radius:6px;
  background:var(--paper-2); color:var(--ink-2); box-shadow:inset 0 0 0 1px var(--rule); white-space:nowrap}
.chip.sol{color:var(--accent-ink); background:color-mix(in srgb, var(--accent) 9%, var(--paper-2))}
.chip.prod{color:var(--ink); background:color-mix(in srgb, var(--ink) 7%, var(--paper-2)); box-shadow:inset 0 0 0 1px var(--rule-2)}
.chip.gov{color:var(--warn-ink); background:var(--warn-bg); box-shadow:inset 0 0 0 1px var(--warn-rule)}
.chip.unv{color:var(--danger); background:var(--danger-bg); box-shadow:inset 0 0 0 1px var(--danger)}
.chip.ver{font-weight:400; color:var(--ink-3); background:transparent; box-shadow:inset 0 0 0 1px var(--rule)}
.ref{font:600 13px var(--font-mono); color:var(--ink); white-space:nowrap}

/* ---------- hero / landing ---------- */
.hero{padding:44px 0 8px; border-bottom:1px solid var(--rule)}
.hero h1{font-size:42px; margin:10px 0 6px; line-height:1.08}
.hero p.lede{max-width:70ch; color:var(--ink-2); font-size:16px; margin:6px 0 22px}
.stats{display:flex; gap:0; border:1px solid var(--rule-2); border-radius:12px; overflow:hidden; background:var(--card); box-shadow:var(--shadow); margin-bottom:34px; flex-wrap:wrap}
.stat{flex:1 1 130px; padding:16px 20px; border-right:1px solid var(--rule)}
.stat:last-child{border-right:none}
.stat b{display:block; font:600 30px/1.1 var(--font-display); color:var(--ink)}
.stat span{font-size:11.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-3)}
.grid{display:grid; gap:14px}
.grid.cards{grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); margin:20px 0 44px}
/* Cards are <a> elements: the whole card is the link, so the mouse hit area is the full
   card exactly as before, and keyboard users get one stop per card. */
.card{display:block; color:var(--ink); text-decoration:none;
  background:var(--card); border:1px solid var(--rule-2); border-radius:12px; padding:18px 20px; box-shadow:var(--shadow);
  cursor:pointer; transition:transform .12s ease, border-color .12s ease; position:relative; overflow:hidden}
.card:hover{transform:translateY(-2px); border-color:var(--rule-2); text-decoration:none}
.card::after{content:"→"; position:absolute; right:16px; top:14px; color:var(--ink-3); font-size:15px; transition:transform .12s}
.card:hover::after{transform:translateX(3px); color:var(--accent-ink)}
.card h3{margin:2px 0 6px; font-size:19px}
.card .desc{color:var(--ink-2); font-size:13px; min-height:2.6em}
.card .meta{display:flex; gap:6px; flex-wrap:wrap; margin-top:12px}
.minibar{display:flex; height:6px; border-radius:3px; overflow:hidden; margin-top:12px; background:var(--paper-2)}
.minibar i{display:block; height:100%}
.minibar i+i{margin-left:2px}
section.block{padding:26px 0 6px}
section.block h2{font-size:24px; margin:4px 0 4px}
section.block .subtitle{color:var(--ink-2); margin:0 0 8px; max-width:80ch}

/* ---------- taxonomy legend (definitions rendered from META, never duplicated here) ---------- */
.legend{border:1px solid var(--rule-2); border-radius:12px; background:var(--card); box-shadow:var(--shadow);
  padding:18px 20px; margin:0 0 34px}
.legend>.overline{display:block; margin-bottom:12px}
.legend .cols{display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:18px 28px}
.legend h4{margin:0 0 9px; font:700 11px var(--font-body); letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.legend dl{margin:0}
.legend dl>div+div{margin-top:11px}
.legend dt{margin:0 0 4px}
.legend dd{margin:0; font-size:12.5px; color:var(--ink-2); line-height:1.45}
.legend.compact{padding:12px 16px; margin:16px 0 0}
.legend.compact dl{display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:10px 24px}
.legend.compact dl>div+div{margin-top:0}
.legend.compact dd{font-size:12px}
.legend.compact dt{margin:0 0 3px}

/* ---------- framework / product page ---------- */
/* ---------- about page: a prose column, the only long-form reading view in the atlas ---------- */
.about{max-width:78ch}
.about h2{font-size:19px; margin:34px 0 10px}
.about h3{font-size:14px; margin:20px 0 6px}
.about p{margin:0 0 11px; color:var(--ink-2); line-height:1.65}
.about ul{margin:0 0 11px; padding-left:20px; color:var(--ink-2); line-height:1.65}
.about li{margin:0 0 7px}
.about li>b, .about p>b{color:var(--ink-1)}
.about .legend{margin:14px 0 0}
.about dl.absent{margin:0}
.about dl.absent>div{margin:0 0 10px}
.about dl.absent dt{font-weight:600; color:var(--ink-1)}
.about dl.absent dd{margin:2px 0 0; color:var(--ink-2); line-height:1.6}
.pagehead{padding:30px 0 18px; border-bottom:1px solid var(--rule)}
.pagehead h1{font-size:31px; margin:8px 0 4px}
.pagehead .full{color:var(--ink-2); max-width:88ch; font-size:14px}
.pagehead .metaline{display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; align-items:center}
.crumb{font-size:12.5px; color:var(--ink-3)} .crumb a{color:var(--ink-3)} .crumb a:hover{color:var(--link)}
.callout{border:1px solid var(--warn-rule); background:var(--warn-bg); color:var(--warn-ink);
  border-radius:10px; padding:12px 16px; font-size:13px; margin:16px 0; max-width:100%}
.callout.gray{border-color:var(--rule-2); background:var(--paper-2); color:var(--ink-2)}
.toolrow{display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:16px 0 4px}
.toolrow .lbl{font-size:12px; color:var(--ink-3); letter-spacing:.06em; text-transform:uppercase}
.fbtn{border:1px solid var(--rule-2); background:var(--card); border-radius:999px; padding:5px 12px; cursor:pointer;
  font:600 12px var(--font-body); color:var(--ink-2)}
.fbtn.on{color:var(--ink); border-color:var(--ink-3); background:var(--paper-2)}
.domain{margin:26px 0 8px}
.domain h3{font-size:14px; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-2);
  border-bottom:1px solid var(--rule); padding-bottom:8px; margin:0 0 12px; font-family:var(--font-body); font-weight:700}

/* ---------- control groups (product-stacked cards) ---------- */
.ctrl{margin:0 0 16px}
.ctrlhead{display:flex; gap:14px; align-items:baseline; padding:6px 2px 8px; flex-wrap:wrap}
.ctrlhead .ref{font-size:14px}
.ctrlhead .intent{font-size:13.8px; color:var(--ink); max-width:100ch; line-height:1.45}
.ctrl details.row{margin-left:14px; border-left:3px solid var(--rule-2)}
.ctrl details.row[open]{border-left-color:var(--accent)}

/* ---------- mapping rows ---------- */
details.row{background:var(--card); border:1px solid var(--rule-2); border-radius:10px; margin:0 0 10px; box-shadow:var(--shadow); overflow:hidden}
details.row summary{list-style:none; cursor:pointer; padding:13px 16px; display:grid;
  grid-template-columns:minmax(96px,auto) 1fr auto; gap:6px 16px; align-items:center}
details.row summary::-webkit-details-marker{display:none}
details.row summary:hover{background:color-mix(in srgb, var(--paper-2) 55%, var(--card))}
.row .intent{font-size:13.8px; color:var(--ink); line-height:1.45}
.row .intent .solline{display:block; margin-top:5px}
.row .variant{display:block; margin-top:4px; font-size:12.5px; color:var(--ink-2)}
.row .badges{display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end}
.row .flip{color:var(--ink-3); font-size:12px; transition:transform .15s; margin-left:2px}
details[open] .flip{transform:rotate(90deg)}
.row .body{border-top:1px solid var(--rule); padding:16px 18px 18px; display:grid; grid-template-columns:1.5fr 1fr; gap:18px 26px}
.row .body h4{margin:0 0 4px; font:700 11px var(--font-body); letter-spacing:.1em; text-transform:uppercase; color:var(--ink-3)}
.row .body p{margin:0 0 14px; font-size:13.5px; color:var(--ink)}
.row .body .aside p{color:var(--ink-2)}
.row .src a{display:block; font-size:12.5px; overflow-wrap:anywhere; margin-bottom:4px}
.row .relms{margin:0 0 14px}
.row .relms .rel{font-size:12.5px; color:var(--ink-2); margin:0 0 6px; line-height:1.45}
.row .relms .rel b{color:var(--ink); font-weight:600}
.row .foot{grid-column:1 / -1; display:flex; gap:10px; align-items:center; flex-wrap:wrap; border-top:1px dashed var(--rule); padding-top:12px}
.rowcaveat{grid-column:1 / -1; border:1px solid var(--warn-rule); background:var(--warn-bg); color:var(--warn-ink);
  padding:10px 12px; border-radius:8px; font-size:12.5px}
.rowunv{grid-column:1 / -1; border:1px solid var(--danger); background:var(--danger-bg); color:var(--danger);
  padding:10px 12px; border-radius:8px; font-size:12.5px; font-weight:600}
details.unvrow{border-color:var(--danger)}

/* ---------- progressive-disclosure toggle (notes / scope detail) ---------- */
details.disclose{margin:10px 0 2px; border:1px solid var(--rule); border-radius:8px; background:var(--paper-2)}
details.disclose>summary{list-style:none; cursor:pointer; padding:8px 12px; font:600 12px var(--font-body);
  letter-spacing:.04em; color:var(--ink-2); display:flex; align-items:center; gap:6px}
details.disclose>summary::-webkit-details-marker{display:none}
details.disclose>summary:hover{color:var(--ink)}
details.disclose>summary .flip{color:var(--ink-3); font-size:12px; transition:transform .15s; margin-left:auto}
details.disclose[open]>summary{border-bottom:1px solid var(--rule)}
details.disclose .disc-body{padding:12px 14px; font-size:13px; color:var(--ink-2); line-height:1.55}

/* ---------- matrix ---------- */
.matrixwrap{overflow-x:auto; padding:8px 0 30px}
table.matrix{border-collapse:separate; border-spacing:2px; font-size:12px}
table.matrix th{font:600 11px var(--font-body); color:var(--ink-2); padding:6px 8px; text-align:left; background:transparent}
table.matrix thead th{height:132px; position:relative; min-width:54px; padding:0}
table.matrix thead th .rot{position:absolute; bottom:8px; left:50%; transform-origin:bottom left; transform:rotate(-52deg); white-space:nowrap; display:block; line-height:1}
table.matrix tbody th{white-space:nowrap; padding-right:12px}
/* Cell figures use --ink, not --ink-2: the heat ramp below is capped so that --ink clears
   4.5:1 against every step of it in both themes (worst case 5.53 light / 4.70 dark). */
table.matrix td{width:52px; height:38px; text-align:center; border-radius:6px; background:var(--heat-0);
  font:600 12px var(--font-mono); color:var(--ink); cursor:pointer; position:relative; padding:0}
/* The cell's link fills the cell, so the click target is the whole cell as before. */
table.matrix td a{display:flex; align-items:center; justify-content:center; width:100%; height:100%;
  color:inherit; text-decoration:none; border-radius:6px}
table.matrix td a:hover{text-decoration:none}
table.matrix td a:focus-visible{outline-offset:-3px; box-shadow:none}
table.matrix td.z{cursor:default; color:var(--ink); opacity:.7}
table.matrix td:hover:not(.z):not(.total):not(.corner){outline:2px solid var(--ink); outline-offset:1px}
table.matrix td.corner{background:transparent; width:auto; height:auto; cursor:default}
table.matrix td.total, table.matrix th.total{background:transparent; font-weight:700; color:var(--ink); cursor:default}
/* The bottom totals row holds values, not headers, so those cells are <td>. They keep the metrics
   they had as <th> so that correcting the semantics costs no layout change. */
table.matrix tbody tr:last-child td.total{width:auto; height:auto; padding:6px 8px; text-align:left}
.legendrow{display:flex; gap:16px; align-items:center; font-size:12px; color:var(--ink-2); flex-wrap:wrap; margin:6px 0 12px}
.legendrow .sw{display:inline-block; width:14px; height:14px; border-radius:4px; vertical-align:-2px; margin-right:5px}

/* ---------- pre-script placeholder ---------- */
.loading{padding:72px 0 0; margin:0; font-family:var(--font-display); font-size:19px; color:var(--ink-3)}

/* ---------- search results ---------- */
.result-item{margin-bottom:10px}
.count-pill{font:600 11px var(--font-mono); background:var(--paper-2); border-radius:999px; padding:3px 9px; color:var(--ink-2); box-shadow:inset 0 0 0 1px var(--rule)}

/* ---------- footer ---------- */
footer.site{border-top:1px solid var(--rule-2); margin-top:56px; padding:26px 0 44px; color:var(--ink-3); font-size:12px}
footer.site .disc{max-width:100ch; margin-bottom:10px; line-height:1.6}
/* Content version reads as the fact; the build timestamp is demoted beneath it (PR-045): a rebuild
   that changed nothing must not look like an update. */
footer.site #footVersion{margin-top:10px; font-size:13.5px; color:var(--ink-1); font-weight:600}
footer.site #footVersion .sep{color:var(--ink-3); font-weight:400; margin:0 7px}
footer.site #footVersion .facts{font-weight:400; color:var(--ink-2)}
footer.site #footMeta{margin-top:3px; font-size:11.5px; color:var(--ink-3)}
footer.site .legal{max-width:100ch; margin:0 0 12px; padding:0 0 0 16px; line-height:1.7}
footer.site .legal li{margin:0}
kbd{font:11px var(--font-mono); border:1px solid var(--rule-2); border-bottom-width:2px; border-radius:4px; padding:1px 5px; background:var(--paper-2); color:var(--ink-2)}

/* ---------- print ---------- */
@media print{
  header.site, .toolrow, .searchbox, .iconbtn, footer .kbdhint{display:none !important}
  body{background:#fff; font-size:11px}
  .card, details.row{box-shadow:none; break-inside:avoid}
  details.row::details-content, details.disclose::details-content{content-visibility:visible; display:block}
  a{color:inherit}
  .hero h1{font-size:28px}
}
@media (max-width:840px){
  details.row summary{grid-template-columns:1fr}
  .row .badges{justify-content:flex-start}
  .row .body{grid-template-columns:1fr}
  .searchbox input{width:160px}
  nav.tabs a{padding:7px 8px; font-size:12.5px}
}
</style>
</head>
<body>
<a class="skip" href="#app">Skip to main content</a>
<script id="pcm-data" type="application/json">/*__DATA__*/</script>

<header class="site"><div class="wrap bar">
  <a class="brand" href="#/" title="Home" id="brandBox">
    <span class="glyph" aria-hidden="true">¶</span><b id="brandTitle"></b><span id="brandVer"></span>
  </a>
  <nav class="tabs" id="tabs" aria-label="Primary">
    <a href="#/" data-tab="home">Industries</a>
    <a href="#/frameworks" data-tab="frameworks">Frameworks</a>
    <a href="#/products" data-tab="products">Product Pivot</a>
    <a href="#/matrix" data-tab="matrix">Density Matrix</a>
    <a href="#/about" data-tab="about">About</a>
  </nav>
  <div class="spacer"></div>
  <div class="searchbox">
    <span class="icon" aria-hidden="true">⌕</span>
    <input id="q" type="search" placeholder="Search controls, refs, products…  ( / )" autocomplete="off" aria-label="Global search">
  </div>
  <button class="iconbtn" id="themeBtn" type="button" title="Toggle light/dark"><span aria-hidden="true">◐</span></button>
  <button class="iconbtn" type="button" onclick="window.print()" aria-label="Print current view" title="Print current view"><span aria-hidden="true">⎙</span></button>
</div></header>

<!-- The placeholder is the whole of <main> until render() replaces it; on a slow connection the
     ~1 MB single-file payload would otherwise paint a blank page. -->
<main id="app" class="wrap" tabindex="-1"><p class="loading">Loading the atlas…</p></main>

<!-- Route-change announcements. <main> is deliberately NOT a live region: render() replaces it
     wholesale, which would queue the entire view (up to 57 mapping cards) for reading. This
     states just the view and what it holds. The loading placeholder above sits outside any live
     region, so it is never announced. -->
<div id="srstatus" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

<footer class="site"><div class="wrap">
  <ul class="legal" id="footLegal"></ul>
  <div class="disc" id="footDisc"></div>
  <nav id="footLinks" aria-label="About this atlas"></nav>
  <div id="footVersion"></div>
  <div id="footMeta"></div>
  <div class="kbdhint" style="margin-top:8px">Press <kbd>/</kbd> to search · Data regenerated from <span class="mono">compliance-atlas.json</span>; do not hand-edit this file.</div>
</div></footer>

<script>
"use strict";
const DATA = JSON.parse(document.getElementById("pcm-data").textContent);
const ROWS = DATA.rows, FW = DATA.frameworks, SOL = DATA.solutions, IND = DATA.industries, META = DATA.meta;
const PRODUCTS = DATA.products, RELPROD = DATA.related_products || {};
const FW_ORDER = Object.keys(FW), PROD_ORDER = Object.keys(PRODUCTS);
const COV_CLASS = {"Direct Support":"b-direct","Partial Support":"b-partial","Evidence Support Only":"b-evidence","Not Covered":"b-nocover"};
const COV_VAR = {"Direct Support":"--direct","Partial Support":"--partial","Evidence Support Only":"--evidence","Not Covered":"--nocover"};
const COV_ORDER = ["Direct Support","Partial Support","Evidence Support Only","Not Covered"];
const CONF_DOTS = {High:"●●●",Medium:"●●○",Low:"●○○"};
const esc = s => String(s??"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
/* Shared explainer for the product pivot (rendered once on the Products index, not per product page). */
const PIVOT_EXPLAINER = "One configuration, many frameworks: a control implemented once shows up as posture everywhere it maps. Open a product below to see every control each of its solutions supports across the atlas.";

/* ---------------- product helpers (generalized) ---------------- */
const prodName = pid => (PRODUCTS[pid]?.short_name) || (PRODUCTS[pid]?.official_name) || RELPROD[pid] || pid;
const prodFull = pid => (PRODUCTS[pid]?.official_name) || RELPROD[pid] || pid;
const solOrderFor = pid => (PRODUCTS[pid]?.solutions || []).concat(["None (boundary row)"]);
const rowSolution = r => r.purview_solution;  /* schema field name retained for compatibility */
const byFw = id => ROWS.filter(r => r.framework === id);
const byProd = pid => ROWS.filter(r => r.product === pid);
const bySolP = (pid, key) => ROWS.filter(r => r.product === pid && rowSolution(r) === key);
const byAlsoP = (pid, key) => ROWS.filter(r => r.product === pid && (r.also_involves||[]).includes(key));
const referencedBy = pid => ROWS.filter(r => r.product !== pid && (r.related_microsoft||[]).some(e => e.product === pid));

/* ---------------- taxonomy definitions (single source: META) ---------------- */
/* The four coverage levels, three confidence levels and four licensing models are defined once in
   assemble.py and shipped in META. Everything on screen — legends and tooltips alike — reads from
   here, so a definition can never drift between the dataset and the UI. */
const COV_DEF = META.coverage_levels || {}, CONF_DEF = META.confidence_levels || {}, LIC_DEF = META.licensing_models || {};
const withDef = (label, def) => def ? `${label} — ${def}` : label;
/* Dataset currency, derived at build time from the rows' own last_verified values. */
function verifiedRange(){
  const v = META.verified_range || {};
  if(!v.earliest) return "";
  return v.earliest === v.latest ? `rows verified ${v.earliest}` : `rows verified ${v.earliest} – ${v.latest}`;
}

/* ---------------- shared fragments ---------------- */
function covBadge(cov){ return `<span class="badge ${COV_CLASS[cov]||""}" title="${esc(withDef(cov, COV_DEF[cov]))}">${esc(cov)}</span>`; }
function confMeter(c){ return `<span class="conf" title="${esc(withDef("Confidence: "+c, CONF_DEF[c]))}"><span class="dots">${CONF_DOTS[c]||""}</span>${esc(c)}</span>`; }
function licChip(model){ return `<span class="chip" style="margin-left:4px" title="${esc(withDef(model, LIC_DEF[model]))}">${esc(model)}</span>`; }
/* dl > div > (dt, dd) — the div wrapper is valid HTML5 and lets the pairs be grid items. */
function defList(pairs){ return `<dl>` + pairs.map(([t,d]) => `<div><dt>${t}</dt><dd>${esc(d)}</dd></div>`).join("") + `</dl>`; }
function taxonomyLegend(compact){
  /* compact = coverage only, for the framework view where stacked product cards make the
     Direct/Partial/Evidence distinction most acute. Full = all three taxonomies, landing page. */
  const cov = COV_ORDER.filter(c => COV_DEF[c]).map(c => [covBadge(c), COV_DEF[c]]);
  if(compact) return `<div class="legend compact"><div class="cols">${defList(cov)}</div></div>`;
  const conf = Object.keys(CONF_DOTS).filter(c => CONF_DEF[c]).map(c => [confMeter(c), CONF_DEF[c]]);
  const lic = Object.entries(LIC_DEF).map(([k,v]) => [`<span class="chip">${esc(k)}</span>`, v]);
  return `<div class="legend"><span class="overline">How to read a mapping</span><div class="cols">
    <div><h4>Coverage · what the claim means</h4>${defList(cov)}</div>
    <div><h4>Confidence · how far it stretches</h4>${defList(conf)}</div>
    <div><h4>Licensing model</h4>${defList(lic)}</div>
  </div></div>`;
}
function minibar(rows){
  const n = rows.length || 1;
  return `<div class="minibar" title="${COV_ORDER.map(c=>`${c}: ${rows.filter(r=>r.coverage===c).length}`).join(" · ")}">` +
    COV_ORDER.map(c => { const k = rows.filter(r=>r.coverage===c).length;
      return k ? `<i style="width:${(100*k/n).toFixed(1)}%;background:var(${COV_VAR[c]})"></i>` : ""; }).join("") + `</div>`;
}
/* Chips shown in a row's <summary> are plain spans, never links: a link inside a disclosure
   control is a nested interactive control (WCAG 4.1.2 Name, Role, Value), which assistive tech
   cannot reliably reach or describe. The same destinations are real links in the expanded body
   (solLinks below, and the framework link already in the foot line), where nesting is legal. */
function solChip(r){
  const key = rowSolution(r);
  const main = key === "None (boundary row)"
    ? `<span class="chip">No ${esc(prodName(r.product))} mapping (boundary)</span>`
    : `<span class="chip sol">${esc(key)}</span>`;
  const also = (r.also_involves||[]).map(a =>
    `<span class="chip" title="Also involves">+ ${esc(a)}</span>`).join(" ");
  return main + (also ? " " + also : "");
}
function solLinks(r){
  const key = rowSolution(r);
  const one = k => `<a href="#/product/${esc(r.product)}/solution/${esc(encodeURIComponent(k))}">${esc(k)}</a>`;
  const parts = (key === "None (boundary row)" ? [] : [one(key)]).concat((r.also_involves||[]).map(one));
  return parts.length ? `<span>· Solution: ${parts.join(", ")}</span>` : "";
}
function prodChip(r){ return `<span class="chip prod" title="${esc(prodFull(r.product))}">${esc(prodName(r.product))}</span>`; }
function relatedBlock(r){
  const rel = r.related_microsoft || [];
  if(!rel.length) return "";
  return `<h4>Related Microsoft products</h4><div class="relms">` + rel.map(e =>
    `<div class="rel">▸ <b>${esc(RELPROD[e.product]||prodFull(e.product))}</b> · ${esc(e.role)}${e.solution?` · ${esc(e.solution)}`:""}<br><span class="tiny">${esc(e.note||"")}</span></div>`).join("") + `</div>`;
}
function rowCard(r, opts={}){
  const unv = r.status !== "verified";
  const fw = FW[r.framework];
  const grouped = !!opts.grouped;
  const col1 = grouped ? prodChip(r) : `<span class="ref" title="${esc(fw.name)}">${esc(r.control_ref)}</span>`;
  const variant = grouped && opts.groupIntent && r.control_intent !== opts.groupIntent
    ? `<span class="variant">${esc(r.control_intent)}</span>` : "";
  const intentLine = grouped ? `<span class="intent">${variant}<span class="solline">${solChip(r)}${opts.showFw?` <span class="chip">${esc(fw.name)}</span>`:""}</span></span>`
    : `<span class="intent">${esc(r.control_intent)}
        <span class="solline">${prodChip(r)} ${solChip(r)}${opts.showFw?` <span class="chip">${esc(fw.name)}</span>`:""}</span></span>`;
  return `<details class="row ${unv?"unvrow":""}" id="${esc(r.id)}">
    <summary>
      ${col1}
      ${intentLine}
      <span class="badges">${covBadge(r.coverage)}${confMeter(r.confidence)}
        ${r.cloud_availability_note?`<span class="chip gov" title="US Government cloud caveat; expand for detail">GOV ⚠</span>`:""}
        ${unv?`<span class="chip unv">UNVERIFIED</span>`:""}
        ${r.last_verified?`<span class="chip ver" title="Last verified against its sources on ${esc(r.last_verified)}">✓ ${esc(r.last_verified)}</span>`:""}
        <span class="flip" aria-hidden="true">›</span></span>
    </summary>
    <div class="body">
      ${unv?`<div class="rowunv">UNVERIFIED: this row could not be confirmed against a live source; do not present without independent verification.</div>`:""}
      <div class="mainsec">
        <h4>How it supports the control</h4><p>${esc(r.how_it_supports)}</p>
        <h4>Capability detail</h4><p>${esc(r.capability_detail)}</p>
        <h4>Configuration evidence</h4><p>${esc(r.config_evidence_example)}</p>
        <h4>Operational evidence</h4><p>${esc(r.operational_evidence_example)}</p>
      </div>
      <div class="aside">
        ${relatedBlock(r)}
        <h4>External dependencies</h4><p>${esc(r.external_dependencies || "None recorded")}</p>
        <h4>License requirement ${licChip(r.licensing_model)}</h4><p>${esc(r.license_requirement)}</p>
        <h4>Sources</h4><div class="src">${(r.sources||[]).map(u=>`<a href="${esc(u)}" target="_blank" rel="noopener">${esc(u.replace(/^https?:\/\//,""))}</a>`).join("")}</div>
      </div>
      ${r.cloud_availability_note?`<div class="rowcaveat">⚠ <b>US Government clouds:</b> ${esc(r.cloud_availability_note)}</div>`:""}
      <div class="foot tiny muted">
        <span>${esc(prodFull(r.product))}</span>
        ${solLinks(r)}
        <span>· Framework: <a href="#/framework/${esc(r.framework)}">${esc(fw.name)}</a> · ${esc(r.framework_version)}</span>
        <span>· Status: <b>${esc(r.status)}</b></span><span>· Last verified: ${esc(r.last_verified)}</span><span>· ID: <span class="mono">${esc(r.id)}</span></span>
      </div>
    </div>
  </details>`;
}
function groupByDomain(rows){
  const m = new Map();
  rows.forEach(r => { const d = r.control_domain || "General"; if(!m.has(d)) m.set(d, []); m.get(d).push(r); });
  return m;
}
function groupByControl(rows){
  const m = new Map();
  rows.forEach(r => {
    const k = r.control_ref;
    if(!m.has(k)) m.set(k, {ref:k, intent:r.control_intent, rows:[]});
    m.get(k).rows.push(r);
  });
  return [...m.values()];
}
function renderControlGroups(rows){
  /* Framework view core: controls with product-tagged mapping cards stacked beneath.
     Generalized for N products; with one product each control usually carries one card. */
  let h = "";
  for(const [dom, rs] of groupByDomain(rows)){
    h += `<div class="domain"><h3>${esc(dom)} <span class="count-pill">${rs.length}</span></h3>`;
    for(const g of groupByControl(rs)){
      h += `<div class="ctrl"><div class="ctrlhead"><span class="ref">${esc(g.ref)}</span><span class="intent">${esc(g.intent)}</span></div>`;
      h += g.rows.map(r => rowCard(r, {grouped:true, groupIntent:g.intent})).join("");
      h += `</div>`;
    }
    h += `</div>`;
  }
  return h;
}
function detailToggle(detail, label){
  /* Progressive disclosure: collapsed <details> holding the verbatim long-form note/scope.
     Native element (no JS to toggle), works offline; joins the print-expansion path below. */
  if(!detail) return "";
  return `<details class="disclose"><summary>${esc(label)} <span class="flip" aria-hidden="true">›</span></summary>`
    + `<div class="disc-body">${esc(detail)}</div></details>`;
}
function cmChip(fw){
  const t = fw.compliance_manager_template || {};
  return t.exists
    ? `<span class="chip" title="${esc(t.note||"")}">Compliance Manager template: ${esc(t.name)}</span>`
    : `<span class="chip" title="${esc(t.note||"")}">No Compliance Manager template</span>`;
}

/* ---------------- views ---------------- */
function vHome(){
  const inds = Object.entries(IND);
  return `<div class="hero">
    <div class="overline">${esc(META.brand.tagline)}${verifiedRange()?` · ${esc(verifiedRange())}`:""}</div>
    <h1>Where does the Microsoft stack fit?</h1>
    <p class="lede">Pick an industry, open the frameworks it answers to, and read off each control's
      product mappings: claim strength, license tier, evidence examples, and the source behind every statement.</p>
    <div class="stats">
      <div class="stat"><b>${PROD_ORDER.length}</b><span>product${PROD_ORDER.length>1?"s":""}</span></div>
      <div class="stat"><b>${Object.keys(FW).length}</b><span>frameworks</span></div>
      <div class="stat"><b>${ROWS.length}</b><span>control mappings</span></div>
      <div class="stat"><b>${ROWS.filter(r=>r.coverage==="Direct Support").length}</b><span>direct-support claims</span></div>
      <div class="stat"><b>${ROWS.filter(r=>r.status!=="verified").length}</b><span>unverified rows</span></div>
    </div>
    ${taxonomyLegend(false)}
  </div>
  <section class="block"><div class="overline">Industry lens</div><h2>Start from an industry</h2>
  <div class="grid cards">${inds.map(([id,i])=>{
    const rows = ROWS.filter(r => i.frameworks.includes(r.framework));
    return `<a class="card" href="#/industry/${esc(id)}" aria-label="${esc(i.name)}">
      <h3>${esc(i.name)}</h3><div class="desc">${esc(i.note)}</div>
      <div class="meta">${i.frameworks.map(f=>`<span class="chip">${esc(FW[f]?.name||f)}</span>`).join("")}</div>
      ${minibar(rows)}</a>`; }).join("")}
  </div>
  ${/* PR-021: say out loud which sectors have no lens and why, rather than letting a reader from one
       of them conclude the atlas simply forgot them. Same META list the about page renders in full. */""}
  <p class="small muted" style="margin-top:16px; max-width:88ch">
    <b>Not covered here:</b> ${(META.absent_industries||[]).map(a =>
      `${esc(a.sector)} (needs ${esc(a.framework)})`).join(", ")} — each would need a framework the atlas
    does not map, so none can be added by relabelling what is already here.
    <a href="#/about">Why, in full</a>.</p>
  </section>`;
}
function vIndustry(id){
  const i = IND[id]; if(!i) return vMissing("industry", id);
  return `<div class="pagehead">
    <div class="crumb"><a href="#/">Industries</a> / ${esc(i.name)}</div>
    <h1>${esc(i.name)}</h1><div class="full">${esc(i.note)}</div>
    ${detailToggle(i.note_detail, "Full industry notes")}</div>
  <section class="block"><h2>Applicable frameworks</h2>
  <div class="grid cards">${i.frameworks.map(fid=>{
    const f = FW[fid], rows = byFw(fid);
    return `<a class="card" href="#/framework/${esc(fid)}" aria-label="${esc(f.name)}">
      <div class="overline">${esc(f.version)}</div><h3>${esc(f.name)}</h3>
      <div class="desc">${esc(f.applies_to)}</div>
      <div class="meta"><span class="count-pill">${rows.length} mapped controls</span>${f.compliance_manager_template?.exists?`<span class="chip">CM template ✓</span>`:""}</div>
      ${minibar(rows)}</a>`; }).join("")}
  </div></section>`;
}
function vFrameworks(){
  return `<div class="pagehead"><div class="overline">Framework view</div><h1>Frameworks</h1>
    <div class="full">Every mapped control, grouped by framework. Each row is verified against a live official source; per-row dates govern currency.</div></div>
  <div class="grid cards" style="margin-top:22px">${FW_ORDER.map(fid=>{
    const f = FW[fid], rows = byFw(fid);
    return `<a class="card" href="#/framework/${esc(fid)}" aria-label="${esc(f.name)}">
      <div class="overline">${esc(f.version)}</div><h3>${esc(f.name)}</h3>
      <div class="desc">${esc(f.applies_to)}</div>
      <div class="meta"><span class="count-pill">${rows.length} controls</span>${cmChip(f)}</div>
      ${minibar(rows)}</a>`; }).join("")}</div>`;
}
let fwFilter = null;
function setFwFilter(c){ fwFilter = c; render({focus:"filter", filter:c}); }
function vFramework(id){
  const f = FW[id]; if(!f) return vMissing("framework", id);
  let rows = byFw(id);
  const filters = COV_ORDER.filter(c => rows.some(r=>r.coverage===c));
  if(fwFilter) rows = rows.filter(r=>r.coverage===fwFilter);
  return `<div class="pagehead">
    <div class="crumb"><a href="#/frameworks">Frameworks</a> / ${esc(f.name)}</div>
    <h1>${esc(f.name)}</h1>
    <div class="full">${esc(f.full_name)}</div>
    <div class="metaline">
      <span class="chip">${esc(f.version)}</span><span class="chip">${esc(f.authority)}</span>${cmChip(f)}
      <a class="small" href="${esc(f.official_source)}" target="_blank" rel="noopener">Official source ↗</a>
      ${f.document_url && f.document_url!==f.official_source?`<a class="small" href="${esc(f.document_url)}" target="_blank" rel="noopener">Document ↗</a>`:""}
    </div>
    ${f.notes?`<div class="callout">${esc(f.notes)}</div>`:""}
    ${detailToggle(f.notes_detail, "Full framework notes")}
  </div>
  <div class="toolrow"><span class="lbl">Coverage filter</span>
    <button type="button" class="fbtn ${!fwFilter?"on":""}" data-cov="" aria-pressed="${!fwFilter}" onclick="setFwFilter(null)">All (${byFw(id).length})</button>
    ${filters.map(c=>`<button type="button" class="fbtn ${fwFilter===c?"on":""}" data-cov="${esc(c)}" aria-pressed="${fwFilter===c}" onclick="setFwFilter('${esc(c)}')">${esc(c)} (${byFw(id).filter(r=>r.coverage===c).length})</button>`).join("")}
    <span class="spacer"></span>
    <button type="button" class="fbtn" onclick="document.querySelectorAll('details.row').forEach(d=>d.open=true)">Expand all</button>
    <button type="button" class="fbtn" onclick="document.querySelectorAll('details.row').forEach(d=>d.open=false)">Collapse all</button>
  </div>
  ${taxonomyLegend(true)}
  ${renderControlGroups(rows)}`;
}
function vProducts(){
  if(PROD_ORDER.length === 1) return vProduct(PROD_ORDER[0]);  /* single product: land directly, via the generalized component */
  return `<div class="pagehead"><div class="overline">Product Pivot</div><h1>Products</h1>
    <div class="full">${esc(PIVOT_EXPLAINER)}</div></div>
  <div class="grid cards" style="margin-top:22px">${PROD_ORDER.map(pid=>{
    const rows = byProd(pid);
    return `<a class="card" href="#/product/${esc(pid)}" aria-label="${esc(prodFull(pid))}">
      <h3>${esc(prodFull(pid))}</h3><div class="desc">${esc(PRODUCTS[pid].notes||"")}</div>
      <div class="meta"><span class="count-pill">${rows.length} mappings</span><span class="count-pill">${PRODUCTS[pid].solutions.length} solutions</span></div>
      ${minibar(rows)}</a>`; }).join("")}</div>`;
}
function vProduct(pid){
  const p = PRODUCTS[pid]; if(!p) return vMissing("product", pid);
  const refs = referencedBy(pid);
  return `<div class="pagehead"><div class="overline">Product Pivot${PROD_ORDER.length>1?` · <a href="#/products">all products</a>`:""}</div>
    <h1>${esc(p.official_name)}</h1>
    <div class="full">${esc(p.notes)}</div>
    <div class="metaline">
      <a class="small" href="${esc(p.licensing_source)}" target="_blank" rel="noopener">Authoritative licensing source ↗</a>
      <a class="small" href="${esc(p.naming_source)}" target="_blank" rel="noopener">Product overview ↗</a>
      <span class="chip">${byProd(pid).length} mappings</span>
    </div>
    ${detailToggle(p.notes_detail, "Full mapping notes")}
  </div>
  <div class="grid cards" style="margin-top:22px">${p.solutions.map(key=>{
    const s = SOL[key]||{}, prim = bySolP(pid,key), also = byAlsoP(pid,key);
    const fwids = [...new Set(prim.concat(also).map(r=>r.framework))];
    return `<a class="card" href="#/product/${esc(pid)}/solution/${esc(encodeURIComponent(key))}" aria-label="${esc(key)}">
      <h3>${esc(key)}</h3><div class="desc">${esc(s.scope||"")}</div>
      <div class="meta"><span class="count-pill">${prim.length} primary</span><span class="count-pill">${also.length} contributing</span><span class="count-pill">${fwids.length} frameworks</span></div>
      ${minibar(prim)}</a>`; }).join("")}
  </div>
  ${refs.length?`<section class="block"><h2>Referenced by other products' mappings</h2>
    <p class="subtitle muted small">Rows mapped to another product that name ${esc(p.official_name)} as a related product.</p>
    ${refs.map(r=>rowCard(r,{showFw:true})).join("")}</section>`:""}`;
}
function vSolution(pid, key){
  key = decodeURIComponent(key);
  const p = PRODUCTS[pid]; if(!p) return vMissing("product", pid);
  const s = SOL[key]; if(!s) return vMissing("solution", key);
  const prim = bySolP(pid,key), also = byAlsoP(pid,key);
  const groupFw = rows => FW_ORDER.filter(f=>rows.some(r=>r.framework===f))
    .map(f=>`<div class="domain"><h3>${esc(FW[f].name)} <span class="count-pill">${rows.filter(r=>r.framework===f).length}</span></h3>
      ${rows.filter(r=>r.framework===f).map(r=>rowCard(r,{showFw:false})).join("")}</div>`).join("");
  return `<div class="pagehead">
    <div class="crumb"><a href="#/products">Product Pivot</a> / <a href="#/product/${pid}">${esc(prodName(pid))}</a> / ${esc(key)}</div>
    <h1>${esc(key)}</h1><div class="full">${esc(s.full_name)}. ${esc(s.scope)}</div>
    <div class="metaline"><a class="small" href="${esc(s.url)}" target="_blank" rel="noopener">Microsoft Learn ↗</a>
      <span class="chip">${prim.length} primary mappings</span><span class="chip">${also.length} contributing mappings</span></div>
    ${detailToggle(s.scope_detail, "Full scope")}
  </div>
  <div class="toolrow">
    <button type="button" class="fbtn" onclick="document.querySelectorAll('details.row').forEach(d=>d.open=true)">Expand all</button>
    <button type="button" class="fbtn" onclick="document.querySelectorAll('details.row').forEach(d=>d.open=false)">Collapse all</button>
  </div>
  ${prim.length?`<section class="block"><h2>Primary mappings</h2>${groupFw(prim)}</section>`:""}
  ${also.length?`<section class="block"><h2>Contributing mappings</h2><p class="subtitle muted small">Rows where ${esc(key)} strengthens a control mapped primarily to another solution.</p>${groupFw(also)}</section>`:""}`;
}
function heatColor(v, max){
  /* The ramp tops out at 55% --partial rather than 86%. Past that the mixed background lands in
     a luminance band where neither a near-black nor a near-white figure reaches 4.5:1, so the
     old light/dark text flip could not be fixed by choosing a better threshold - it had to be
     removed. Capping here lets every cell keep a single --ink figure. The .6 exponent is
     unchanged, so the low end of the ramp still separates as before. */
  if(!v) return null;
  const t = Math.pow(v/max, .6);
  return `color-mix(in srgb, var(--partial) ${Math.round(14+41*t)}%, var(--heat-0))`;
}
function matrixTable(rowLabels, colLabels, cellFn, opts={}){
  /* Generic heat table. rowLabels/colLabels: [{id,label}]. cellFn(rid,cid) -> {count, href}
     Every populated cell holds a link filling the cell, named "<row> × <column>: n row(s)" so it
     carries its meaning out of context; a bare "12" would not. Empty cells keep the decorative
     dot for sighted readers and expose a plain "0" to assistive tech. The corner cell is a <td>
     (it heads nothing) and the bottom totals are <td> so no <th> is left without data cells. */
  let max = 1;
  rowLabels.forEach(r=>colLabels.forEach(c=>{ max = Math.max(max, cellFn(r.id,c.id).count); }));
  const sigma = `<span aria-hidden="true">Σ</span><span class="sr-only">Total</span>`;
  const head = `<thead><tr><td class="corner"></td>${colLabels.map(c=>`<th scope="col"><span class="rot">${esc(c.label)}</span></th>`).join("")}<th scope="col" class="total" style="vertical-align:bottom">${sigma}</th></tr></thead>`;
  const body = rowLabels.map(r=>{
    let rowTotal = 0;
    const tds = colLabels.map(c=>{
      const {count, href} = cellFn(r.id, c.id); rowTotal += count;
      if(!count) return `<td class="z"><span aria-hidden="true">·</span><span class="sr-only">0</span></td>`;
      const name = `${r.label} × ${c.label}: ${count} row(s)`;
      return `<td style="background:${heatColor(count, max)}"><a href="${esc(href)}" title="${esc(name)}" aria-label="${esc(name)}">${count}</a></td>`;
    }).join("");
    return `<tr><th scope="row">${esc(r.label)}</th>${tds}<td class="total">${rowTotal}</td></tr>`;
  }).join("");
  const totals = `<tr><th scope="row" class="total">${sigma}</th>${colLabels.map(c=>{
    const t = rowLabels.reduce((a,r)=>a+cellFn(r.id,c.id).count, 0); return `<td class="total">${t}</td>`; }).join("")}<td class="total">${opts.grand??""}</td></tr>`;
  /* The table is named with aria-label rather than <caption>: Chrome reserves a border-spacing
     gap for the caption box even when it is visually hidden, which pushed the body down 2px. */
  return `<div class="matrixwrap"><table class="matrix"${opts.caption?` aria-label="${esc(opts.caption)}"`:""}>${head}<tbody>${body}${totals}</tbody></table></div>`;
}
function vMatrix(){
  const fwL = FW_ORDER.map(f=>({id:f, label:FW[f].name}));
  const prodL = PROD_ORDER.map(p=>({id:p, label:prodName(p)}));
  const top = matrixTable(fwL, prodL,
    (fid,pid)=>({count: byFw(fid).filter(r=>r.product===pid).length, href:`#/matrix/${pid}`}),
    {grand: ROWS.length, caption: "Mapped controls per framework and product. Each populated cell links to that product's density detail."});
  /* Single-product convenience: embed the per-product drill below, via the same generalized body. */
  const drills = PROD_ORDER.length===1 ? matrixProductSection(PROD_ORDER[0])
    : `<p class="subtitle muted small" style="margin-top:6px">Click a product column cell to drill into its frameworks × solutions matrix.</p>`;
  return `<div class="pagehead"><div class="overline">Coverage density</div><h1>Frameworks × products</h1>
    <div class="full">Count of mapped controls per product. Darker = more rows. Drill into a product for its frameworks × solutions detail.
    Boundary rows (deliberate "not covered" verdicts) count toward totals; honesty is part of the map.</div></div>
  ${top}${drills}`;
}
function matrixProductSection(pid){
  const fwL = FW_ORDER.map(f=>({id:f, label:FW[f].name}));
  const solL = solOrderFor(pid).map(s=>({id:s, label: s==="None (boundary row)"?"(boundary)":s}));
  const inner = matrixTable(fwL, solL,
    (fid,skey)=>({count: byFw(fid).filter(r=>r.product===pid && rowSolution(r)===skey).length,
                  href:`#/cell/${pid}/${fid}/${encodeURIComponent(skey)}`}),
    {grand: byProd(pid).length, caption: `${prodFull(pid)}: primary mappings per framework and solution. Each populated cell links to that cell's rows.`});
  return `<section class="block"><h2>${esc(prodFull(pid))}: frameworks × solutions</h2>
    <div class="legendrow"><span class="muted">cells are primary-solution counts; contributing solutions are listed on each row · click a cell to open its rows</span></div>
    ${inner}</section>`;
}
function vMatrixProduct(pid){
  const p = PRODUCTS[pid]; if(!p) return vMissing("product", pid);
  return `<div class="pagehead"><div class="crumb"><a href="#/matrix">Density Matrix</a> / ${esc(prodName(pid))}</div>
    <h1>${esc(prodFull(pid))} density</h1></div>
  ${matrixProductSection(pid)}`;
}
function vCell(pid, fid, skey){
  skey = decodeURIComponent(skey);
  const f = FW[fid]; if(!f) return vMissing("framework", fid);
  if(!PRODUCTS[pid]) return vMissing("product", pid);
  const rows = byFw(fid).filter(r=>r.product===pid && rowSolution(r)===skey);
  return `<div class="pagehead"><div class="crumb"><a href="#/matrix">Density Matrix</a> / cell</div>
    <h1>${esc(f.name)} × ${esc(skey)} <span class="chip prod">${esc(prodName(pid))}</span></h1>
    <div class="metaline"><span class="count-pill">${rows.length} row(s)</span></div></div>
  <div style="height:14px"></div>${rows.map(r=>rowCard(r)).join("")}`;
}
function vSearch(q){
  q = decodeURIComponent(q||"").trim();
  const terms = q.toLowerCase().split(/\s+/).filter(Boolean);
  /* Index every field a reader might reasonably search on. The government-cloud note and the two
     evidence examples are the sector-specific content ("GCC High", "Azure Government", "DoD");
     coverage/confidence make "direct support" a query; id makes a cited row findable by its id. */
  const hay = r => [r.control_ref, r.control_intent, rowSolution(r), (r.also_involves||[]).join(" "),
    r.capability_detail, r.how_it_supports, r.external_dependencies, r.legacy_dependencies,
    (r.related_microsoft||[]).map(e=>(RELPROD[e.product]||e.product)+" "+(e.note||"")).join(" "),
    r.license_requirement, r.licensing_model, r.product, prodFull(r.product),
    FW[r.framework].name, r.control_domain,
    r.cloud_availability_note, r.config_evidence_example, r.operational_evidence_example,
    r.coverage, r.confidence, r.id].join(" ").toLowerCase();
  const hits = terms.length ? ROWS.filter(r => terms.every(t => hay(r).includes(t))) : [];
  return `<div class="pagehead"><div class="overline">Global search</div><h1>“${esc(q)}”</h1>
    <div class="metaline"><span class="count-pill">${hits.length} matching row(s)</span></div></div>
  <div style="height:14px"></div>
  ${hits.length ? hits.map(r=>`<div class="result-item">${rowCard(r,{showFw:true})}</div>`).join("")
    : `<div class="callout gray">No rows match. Try a control ref (e.g. <span class="mono">3.13.16</span>, <span class="mono">A.8.12</span>, <span class="mono">CC6.7</span>), a product (<span class="mono">purview</span>), or a keyword (<span class="mono">retention</span>, <span class="mono">CUI</span>).</div>`}`;
}
function vMissing(kind, id){ return `<div class="pagehead"><h1>Not found</h1><div class="full">No ${esc(kind)} “${esc(id)}”.</div></div>`; }

/* ---------------- about / methodology (PR-044, absorbing PR-021) ---------------- */
/* Written for someone who has never seen the repository: no section references, no build jargon.
   Everything factual is read from META or counted off ROWS, so the page cannot claim a scope,
   a count, or a date the dataset does not actually have. The taxonomy definitions are the shared
   legend component — this page defines none of them itself. */
function vAbout(){
  const P = META.project || {}, unver = ROWS.filter(r => r.status !== "verified").length;
  const repo = esc(P.repo_url || ""), issues = esc(P.issues_url || "");
  const prodNames = PROD_ORDER.map(prodFull).join(", ");
  const absent = (META.absent_industries || []).map(a =>
    `<div><dt>${esc(a.sector)}</dt><dd>Would need ${esc(a.framework)}. ${esc(a.reason)}</dd></div>`).join("");
  return `<div class="pagehead">
    <div class="overline">Methodology &amp; scope</div>
    <h1>About this atlas</h1>
    <div class="full">${esc(META.brand.title)} maps published regulatory and control frameworks onto Microsoft security
      products, one control at a time, and shows its working. This page covers how a mapping is made,
      what it will and will not tell you, and how to correct it when it is wrong.</div>
  </div>

  <section class="block about">
    <h2>What this is, and what it is not</h2>
    <p>This is a reference mapping. For every control in every framework it carries, the atlas records which
      Microsoft product bears on that control, how strongly, what you could show an assessor as evidence, and
      the sources behind the claim.</p>
    <p>It is <b>not</b> an attestation, a certification, or an assessment of your organization. It is not legal
      or audit advice. Most importantly, it never claims that a product <b>satisfies</b> a requirement. Products
      support controls and produce evidence for them; organizations satisfy requirements, through configuration,
      process, and people that no dataset can see. Every verdict here is worded to keep that distinction visible,
      which is why the strongest one available is <b>Direct Support</b> and not “compliant”.</p>

    <h2>How a row is made</h2>
    <p>Every row starts from the framework text, not from a product datasheet.</p>
    <ul>
      <li><b>Frameworks are version-pinned.</b> Each row states the edition it maps — ISO/IEC 27001:2022,
        PCI DSS v4.0.1, NIST SP 800-53 Rev 5 — because control numbering moves between revisions and a mapping
        to an unnamed edition is not checkable.</li>
      <li><b>Control intent is paraphrased, never quoted.</b> The atlas says what a control is asking for in its
        own words. That is partly a copyright constraint and partly a usability one, but it cuts both ways:
        a paraphrase is an interpretation, so read the standard itself before relying on any mapping.</li>
      <li><b>Every row cites at least one official source and at least one Microsoft source.</b> The official
        source is the framework's own authority — the regulator, the standards body, the regulation text. The
        Microsoft source is the product documentation behind the capability claim. The one exception is a
        boundary row: where the verdict is <b>Not Covered</b> there is no Microsoft capability to cite, and that
        absence is the finding.</li>
      <li><b>Every row carries its own verification date</b>, recording when its claims were last checked against
        those sources — not when this page was generated.</li>
      <li><b>Rows that could not be confirmed are labelled UNVERIFIED</b> rather than quietly published alongside
        the rest. ${unver === 0
          ? `The atlas currently has none: all ${ROWS.length} rows have been checked against a live source.`
          : `The atlas currently has ${plural(unver, "such row")}.`}</li>
    </ul>

    <h2>How to read a mapping</h2>
    <p>Three taxonomies do the work. Coverage says how strong the claim is, confidence says how far it stretches,
      and the licensing model says how you pay for the capability. They are defined once and used everywhere:</p>
    ${taxonomyLegend(false)}

    <h2>Scope, and its edges</h2>
    <p>${PROD_ORDER.length} products — ${esc(prodNames)} — across ${Object.keys(FW).length} frameworks and
      ${ROWS.length} control mappings.</p>
    <h3>The product roadmap is closed</h3>
    <p>These six cover the ground where compliance frameworks and the Microsoft security stack actually meet:
      data protection, identity, endpoint, detection and response, logging, and cloud posture. Adding a seventh
      would mean either repeating what these already carry or reaching for products whose relationship to control
      text is too thin to map honestly. Depth across ${Object.keys(FW).length} frameworks is worth more here than
      breadth across more products.</p>
    <h3>Some products appear only as references</h3>
    <p>Microsoft Priva is named on privacy rows as a contributing product but has no rows of its own. It belongs
      in the picture, and mapping it properly is a larger job than gesturing at it — so it is pointed to rather
      than half-covered.</p>
    <h3>Some industries are missing, and it is a framework problem</h3>
    <p>Each sector below would need a framework the atlas does not yet map. None of them can be added by
      relabelling what is already here.</p>
    <dl class="absent">${absent}</dl>

    <h2>How current it is</h2>
    <p>${verifiedRange() ? esc(verifiedRange().replace(/^rows /, "Rows currently in the atlas were ")) + "." : ""}
      ${esc(META.reverification_policy || "")}</p>
    <p>The <b>built</b> timestamp in the footer is a different thing: it is when this page was last generated, and
      it moves on every rebuild whether or not any content changed. The version number above it is what tells you
      the content changed — you are reading version <b>${esc(META.brand.atlas_version)}</b>, and the
      ${P.changelog_url ? `<a href="${esc(P.changelog_url)}">changelog</a>` : "changelog"} records what moved in
      each one, including corrections made after a reader reported them.</p>

    <h2>Who maintains it, and how to correct it</h2>
    <p>${esc(P.maintainer || "")} maintains the atlas independently. It is not affiliated with, sponsored by, or
      endorsed by Microsoft. The dataset and the code that builds it are public:
      <a href="${repo}">${repo}</a>.</p>
    <p><b>Corrections are wanted.</b> With ${ROWS.length} rows spanning six products that change constantly, some
      of this is wrong and more of it will go stale. If you find a mis-mapped control, a licensing claim that no
      longer holds, or a dead citation, please <a href="${issues}">open an issue</a> — fixes are recorded so you
      can see that a report landed.</p>
    <p>Content is licensed <b>${esc(P.content_license || "")}</b> and the build code <b>${esc(P.code_license || "")}</b>;
      reuse and adapt it with attribution. That open license is only possible because the atlas paraphrases control
      intent instead of reproducing standards text — the frameworks themselves remain the property of their authors,
      so anyone adapting this work needs to keep the paraphrase rule intact.</p>
  </section>`;
}

/* ---------------- router ---------------- */
const dec = s => { try { return decodeURIComponent(s||""); } catch(e){ return s||""; } };
const srStatus = document.getElementById("srstatus");
const plural = (k, w) => `${k} ${w}${k===1?"":"s"}`;
let booted = false;
function render(opts){
  opts = opts || {};
  const h = location.hash.replace(/^#\/?/, "");
  const [p1, p2, p3, p4] = h.split("/");
  const app = document.getElementById("app");
  /* view: the page name for document.title. Empty on the landing page, which takes the bare brand.
     note: what the view holds, for the status announcement. Index views count what they list;
     row-listing views are counted off the rendered DOM below, so the number announced is the
     number actually on screen (the coverage filter included). */
  let tab = "home", html, view = "", note = "", countRows = false;
  if(!p1){ html = vHome(); note = plural(ROWS.length, "mapping"); }
  else if(p1==="industry") { html = vIndustry(p2); tab="home"; view = IND[p2]?.name || "Not found";
    note = plural((IND[p2]?.frameworks||[]).length, "framework"); }
  else if(p1==="frameworks"){ html = vFrameworks(); tab="frameworks"; view = "Frameworks"; note = plural(FW_ORDER.length, "framework"); }
  else if(p1==="framework"){ html = vFramework(p2); tab="frameworks"; view = FW[p2]?.name || "Not found"; countRows = true; }
  else if(p1==="products"){ html = vProducts(); tab="products"; view = PROD_ORDER.length===1 ? prodFull(PROD_ORDER[0]) : "Products";
    note = plural(PROD_ORDER.length, "product"); }
  else if(p1==="product" && p3==="solution"){ html = vSolution(p2, p4); tab="products"; view = SOL[dec(p4)] ? `${dec(p4)} · ${prodName(p2)}` : "Not found"; countRows = true; }
  else if(p1==="product"){ html = vProduct(p2); tab="products"; view = PRODUCTS[p2] ? prodFull(p2) : "Not found";
    note = PRODUCTS[p2] ? plural(PRODUCTS[p2].solutions.length, "solution") : ""; }
  else if(p1==="solutions"){ location.hash = "#/products"; return; }               /* legacy route */
  else if(p1==="solution"){ location.hash = `#/product/${PROD_ORDER[0]}/solution/${p2}`; return; }  /* legacy route */
  else if(p1==="matrix" && p2){ html = vMatrixProduct(p2); tab="matrix"; view = PRODUCTS[p2] ? `${prodName(p2)} density` : "Not found";
    note = PRODUCTS[p2] ? plural(byProd(p2).length, "mapping") : ""; }
  else if(p1==="matrix"){ html = vMatrix(); tab="matrix"; view = "Density matrix"; note = plural(ROWS.length, "mapping"); }
  else if(p1==="cell"){ html = vCell(p2, p3, p4); tab="matrix"; view = FW[p3] ? `${FW[p3].name} × ${dec(p4)}` : "Not found"; countRows = true; }
  else if(p1==="search"){ html = vSearch(p2); tab=""; view = `Search: ${dec(p2)}`; countRows = true; }
  else if(p1==="about"){ html = vAbout(); tab="about"; view = "About"; }
  else { html = vMissing("page", p1); view = "Not found"; }
  app.innerHTML = html;
  document.querySelectorAll("#tabs a").forEach(a=>{
    const on = a.dataset.tab===tab;
    a.classList.toggle("on", on);
    if(on) a.setAttribute("aria-current","page"); else a.removeAttribute("aria-current");
  });
  if(!["framework"].includes(p1)) fwFilter = null;
  window.scrollTo(0,0);
  /* Per-route title: bookmarks, browser history and pasted links now identify the view (PR-003). */
  document.title = view ? `${view} · ${META.brand.title}` : META.brand.title;

  /* ---- PR-002 announcement model ----
     Focus moves to the view's heading, which is what actually relocates a screen reader's
     reading cursor into the new view; the status region then states where the user landed.
     On the very first paint focus stays at the top of the document, so the skip link is the
     first Tab stop and nothing talks over the browser's own page-load announcement. */
  const first = !booted; booted = true;
  const h1 = app.querySelector("h1");
  if(h1) h1.setAttribute("tabindex", "-1");
  if(countRows) note = plural(app.querySelectorAll("details.row").length, "mapping");
  if(fwFilter) note += `, filtered to ${fwFilter}`;
  if(first){
    /* leave focus where it is */
  } else if(opts.focus === "filter"){
    /* Re-rendering destroys the button that was just pressed; put focus back on its replacement
       so a keyboard user stays in the filter row. No preventScroll: let it scroll back into view. */
    const b = app.querySelector(`.fbtn[data-cov="${opts.filter || ""}"]`);
    if(b) b.focus(); else if(h1) h1.focus({preventScroll:true});
  } else if(h1){
    h1.focus({preventScroll:true});
  }
  if(!first) srStatus.textContent = note ? `${view || META.brand.title} — ${note}` : (view || META.brand.title);
}
window.addEventListener("hashchange", () => render());

/* ---------------- skip link ---------------- */
/* The router owns the hash, so the skip link moves focus itself rather than letting the browser
   navigate to "#app" — that would be parsed as a route and render the "not found" view. */
document.querySelector("a.skip").addEventListener("click", e => {
  e.preventDefault();
  document.getElementById("app").focus();
});

/* ---------------- search box ---------------- */
const q = document.getElementById("q");
q.addEventListener("keydown", e => { if(e.key==="Enter" && q.value.trim()) location.hash = "#/search/"+encodeURIComponent(q.value.trim()); });
document.addEventListener("keydown", e => {
  if(e.key==="/" && document.activeElement!==q){ e.preventDefault(); q.focus(); }
  if(e.key==="Escape") q.blur();
});

/* ---------------- theme ---------------- */
const themeBtn = document.getElementById("themeBtn");
function setTheme(t){
  document.documentElement.dataset.theme = t;
  /* The button's name states what activating it will do, so it is meaningful without the glyph. */
  themeBtn.setAttribute("aria-label", t==="dark" ? "Switch to light theme" : "Switch to dark theme");
  try{localStorage.setItem("pcm-theme", t);}catch(e){}
}
themeBtn.addEventListener("click", ()=> setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));
(function(){ let t = new URLSearchParams(location.search).get("theme");
  if(!t){ try{t=localStorage.getItem("pcm-theme");}catch(e){} }
  if(!t) t = matchMedia("(prefers-color-scheme: dark)").matches ? "dark":"light"; setTheme(t); })();

/* ---------------- print: expand rows, then restore ---------------- */
window.addEventListener("beforeprint", ()=>document.querySelectorAll("details.row, details.disclose").forEach(d=>{d.dataset.wasOpen=d.open?"1":""; d.open=true;}));
window.addEventListener("afterprint", ()=>document.querySelectorAll("details.row, details.disclose").forEach(d=>{if(!d.dataset.wasOpen) d.open=false; delete d.dataset.wasOpen;}));

/* ---------------- brand & footer ---------------- */
document.title = META.brand.title;
document.getElementById("brandTitle").textContent = META.brand.title;
document.getElementById("brandBox").title = META.brand.tagline + " · Home";
document.getElementById("brandVer").textContent = "v" + META.brand.atlas_version + (META.brand.working_title ? " · working title" : "");
document.getElementById("footLegal").innerHTML = (META.footer_lines||[]).map(l=>`<li>${esc(l)}</li>`).join("");
document.getElementById("footDisc").textContent = META.disclaimer;
/* Footer links: the about route plus the off-site repository. Kept out of footer_lines, which are
   escaped plain text by design. */
(function(){
  const P = META.project || {};
  const links = [`<a href="#/about">About &amp; methodology</a>`];
  if(P.repo_url) links.push(`<a href="${esc(P.repo_url)}">Source &amp; data on GitHub</a>`);
  if(P.changelog_url) links.push(`<a href="${esc(P.changelog_url)}">Changelog</a>`);
  if(P.issues_url) links.push(`<a href="${esc(P.issues_url)}">Report a correction</a>`);
  document.getElementById("footLinks").innerHTML = links.join(`<span aria-hidden="true"> · </span>`);
})();
/* Content version, then the build timestamp beneath it. These are different facts: the version moves
   when the dataset changes, the timestamp moves on every rebuild. */
document.getElementById("footVersion").innerHTML =
  `Version ${esc(META.brand.atlas_version)}<span class="sep" aria-hidden="true">·</span>` +
  `<span class="facts">${ROWS.length} rows · ${Object.keys(FW).length} frameworks · ` +
  `${plural(PROD_ORDER.length, "product")} · per-row verification dates govern currency</span>`;
document.getElementById("footMeta").textContent =
  `Built ${META.generated} from compliance-atlas.json. A rebuild moves this timestamp whether or not any content changed.`;

render();
</script>
